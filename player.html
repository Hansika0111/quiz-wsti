<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WSTI Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root{--red:#e21b3c;--blue:#1368ce;--yellow:#d89e00;--green:#26890c;
    --navy:#0A2A43;--teal:#18cb96;--skyteal:#7FD8C3;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Montserrat','Segoe UI',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{color:#fff;display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden;
    background:
      radial-gradient(circle at 20% 0%, rgba(99,102,241,.35), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(24,203,150,.30), transparent 50%),
      radial-gradient(circle at 50% 0%, #143b5c, #0A2A43 70%);
    background-attachment:fixed;}
  .top{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;font-weight:800;}
  .top .nm{opacity:.85;}
  .top .sc{background:linear-gradient(120deg,var(--teal),var(--skyteal));color:var(--navy);padding:4px 16px;border-radius:30px;
    box-shadow:0 0 18px rgba(24,203,150,.5);}
  .wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;}
  h1{font-size:30px;margin-bottom:6px;display:flex;align-items:center;gap:10px;justify-content:center;}
  h1 .wsti-mark{width:34px;height:34px;}
  h1 .tag{color:var(--teal);font-weight:800;}
  .sub{opacity:.8;margin-bottom:26px;font-size:17px;}
  input,textarea{width:100%;max-width:420px;padding:18px;border:none;border-radius:14px;font-size:20px;margin-bottom:14px;}
  textarea{min-height:120px;resize:none;}
  .go{width:100%;max-width:420px;padding:18px;border:none;border-radius:14px;background:linear-gradient(120deg,var(--teal),var(--skyteal));color:var(--navy);font-size:22px;font-weight:800;cursor:pointer;box-shadow:0 0 24px rgba(24,203,150,.4);}
  .go:active{transform:translateY(2px);}
  .qbar{padding:16px 18px 4px;text-align:center;font-size:22px;font-weight:800;line-height:1.25;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;flex:1;padding:14px;}
  .btn{border:none;border-radius:16px;color:#fff;font-size:18px;font-weight:800;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;box-shadow:0 7px 0 rgba(0,0,0,.3);padding:14px;text-align:center;line-height:1.2;
    opacity:0;transform:translateY(16px);animation:bIn .4s forwards;}
  @keyframes bIn{to{opacity:1;transform:none;}}
  .btn:active{transform:translateY(4px);box-shadow:0 3px 0 rgba(0,0,0,.3);}
  .c0{background:linear-gradient(135deg,#ff3658,var(--red));}.c1{background:linear-gradient(135deg,#2b86f0,var(--blue));}
  .c2{background:linear-gradient(135deg,#f0b91d,var(--yellow));}.c3{background:linear-gradient(135deg,#36b317,var(--green));}
  .btn svg{width:40px;height:40px;fill:#fff;flex:none;}
  h1 svg{fill:none;}
  .msg{font-size:26px;font-weight:bold;}
  .big{font-size:64px;margin-bottom:10px;animation:popf .5s cubic-bezier(.2,1.4,.4,1) both;}
  @keyframes popf{from{transform:scale(.4);opacity:0;}to{transform:scale(1);opacity:1;}}
  .feedback{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;animation:fIn .4s ease both;}
  @keyframes fIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  .gain{font-size:34px;font-weight:bold;margin:8px 0;color:var(--skyteal);}
  .rank{opacity:.85;font-size:20px;}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="top hidden" id="top"><div class="nm" id="pname"></div><div class="sc" id="pscore">—</div></div>
<div class="wrap" id="wrap"></div>

<script>
const SHAPES = [
  '<svg viewBox="0 0 100 100"><polygon points="50,12 92,86 8,86"/></svg>',
  '<svg viewBox="0 0 100 100"><polygon points="50,8 92,50 50,92 8,50"/></svg>',
  '<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="42"/></svg>',
  '<svg viewBox="0 0 100 100"><rect x="14" y="14" width="72" height="72" rx="6"/></svg>'
];
let pid = localStorage.getItem('wsti_id') || '';
let pname = localStorage.getItem('wsti_name') || '';
let state=null, answeredQ=-1, lastSig='';
let _es=null, _poll=null, _got=false;
function isLan(){
  const h=location.hostname;
  return h==='localhost'||h==='127.0.0.1'||/^192\.168\./.test(h)||/^10\./.test(h)
    ||/^172\.(1[6-9]|2\d|3[01])\./.test(h)||h==='';
}

const wrap=()=>document.getElementById('wrap');
function show(html){ wrap().innerHTML=html; }
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function ord(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}

function joinScreen(){
  document.getElementById('top').classList.add('hidden');
  show(`<h1><svg class="wsti-mark" viewBox="0 0 100 100" fill="none" stroke="#18cb96" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"><path d="M27 73 L70 30"/><path d="M44 28 H72 V56"/></svg>WSTI <span class="tag">Quiz</span></h1><div class="sub">Enter a nickname to join</div>
    <input id="name" maxlength="20" placeholder="Your nickname" autocomplete="off" value="${esc(pname)}">
    <button class="go" onclick="doJoin()">Join game →</button>`);
  const n=document.getElementById('name'); n.focus();
  n.addEventListener('keydown',e=>{if(e.key==='Enter')doJoin();});
}

function doJoin(){
  unlockAudio();
  const name=document.getElementById('name').value.trim();
  if(!name){return;}
  fetch('/join',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})})
    .then(r=>r.json()).then(d=>{
      pid=d.id; pname=d.name;
      localStorage.setItem('wsti_id',pid); localStorage.setItem('wsti_name',pname);
      connect();
    });
}

// Only re-render when the player's view actually changes — otherwise polling
// (every 1.2s) rebuilds the screen and would flicker / wipe a typed answer.
let lastRenderSig='';
function renderSig(d){
  const p=d.phase, y=d.you||{};
  if(p==='lobby')    return 'lobby|'+(y.name||'');
  if(p==='question') return 'q|'+d.qIndex+'|'+(d.question&&d.question.type)+'|'+(y.answered?1:0);
  if(p==='reveal')   return 'r|'+d.qIndex+'|'+(y.correct?1:0)+'|'+(y.speedRank||0);
  if(p==='podium')   return 'pod|'+(y.rank||0)+'|'+(y.nCorrect||0)+'|'+(y.avg||0);
  return p;
}
function applyState(d){
  state=d;
  const sig=renderSig(d);
  if(sig===lastRenderSig) return;
  lastRenderSig=sig;
  render();
}
function connect(){
  _got=false;
  if(_es){ _es.close(); _es=null; }
  if(_poll){ clearInterval(_poll); _poll=null; }
  const sseUrl='/events?role=player&id='+encodeURIComponent(pid);
  const stateUrl='/state?id='+encodeURIComponent(pid);
  const startPoll=()=>{ if(_poll) return; if(_es){_es.close(); _es=null;}
    const f=()=>fetch(stateUrl).then(r=>r.json()).then(applyState).catch(()=>{});
    f(); _poll=setInterval(f, 1200); };
  if(isLan()){
    try{
      _es=new EventSource(sseUrl);
      _es.onmessage=e=>{ _got=true; applyState(JSON.parse(e.data)); };
      _es.onerror=()=>{ if(!_got) startPoll(); };
    }catch(e){ startPoll(); }
    setTimeout(()=>{ if(!_got) startPoll(); }, 3000);
  } else { startPoll(); }
}

function answer(idx){
  unlockAudio();
  if(answeredQ===state.qIndex) return;
  answeredQ=state.qIndex;
  fetch('/answer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:pid,idx})});
  show(`<div class="feedback"><div class="big">⏳</div><div class="msg">Answer locked in!</div>
    <div class="rank">Hang tight…</div></div>`);
}

function submitOpen(){
  unlockAudio();
  const t=document.getElementById('otext').value.trim();
  if(!t) return;
  answeredQ=state.qIndex;
  fetch('/answer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:pid,text:t})});
  show(`<div class="feedback"><div class="big">✅</div><div class="msg">Sent!</div>
    <div class="rank">Look at the big screen 👀</div></div>`);
}

function render(){
  if(!state) return;
  if(!pid || !state.you){ joinScreen(); return; }
  const top=document.getElementById('top');
  top.classList.remove('hidden');
  document.getElementById('pname').textContent=state.you.name;
  document.getElementById('pscore').textContent = state.you.rank ? '#'+state.you.rank : '—';

  const p=state.phase;
  if(p==='lobby'){
    show(`<div class="feedback"><div class="big">🎉</div><div class="msg">You're in, ${esc(state.you.name)}!</div>
      <div class="rank">Waiting for the host to start…</div></div>`);
  } else if(p==='question'){
    const q=state.question;
    if(answeredQ===state.qIndex || state.you.answered){
      if(q.type==='open'){
        show(`<div class="feedback"><div class="big">✅</div><div class="msg">Sent!</div><div class="rank">Look at the big screen 👀</div></div>`);
      } else {
        show(`<div class="feedback"><div class="big">⏳</div><div class="msg">Answer locked in!</div><div class="rank">Hang tight…</div></div>`);
      }
      return;
    }
    if(q.type==='open'){
      if(document.getElementById('otext')) return;   // keep what they're already typing
      show(`<div style="width:100%;max-width:440px">
        <div class="msg" style="margin-bottom:8px">${q.emoji?q.emoji+' ':''}${esc(q.text)}</div>
        <div class="sub" style="margin-bottom:14px">✍️ Type your answer, then tap Send</div>
        <textarea id="otext" maxlength="250" placeholder="Type here…"></textarea>
        <button class="go" onclick="submitOpen()">Send →</button></div>`);
    } else {
      const btns=q.options.map((o,i)=>`<button class="btn c${i}" style="animation-delay:${i*0.07}s" onclick="answer(${i})">${SHAPES[i]}<span>${esc(o)}</span></button>`).join('');
      wrap().innerHTML=`<div class="qbar">${q.emoji?q.emoji+' ':''}${esc(q.text)}</div><div class="grid">${btns}</div>`;
    }
  } else if(p==='reveal'){
    const q=state.question;
    if(q.type==='open'){
      show(`<div class="feedback"><div class="big">📺</div><div class="msg">Answers are on the big screen!</div></div>`);
    } else if(state.you.answered){
      const ok=state.you.correct;
      let speed='';
      if(ok && state.you.speedRank){
        speed = `<div class="gain">${ord(state.you.speedRank)} fastest ⚡</div>`;
      }
      show(`<div class="feedback"><div class="big">${ok?'✅':'❌'}</div>
        <div class="msg">${ok?'Correct!':'Not quite!'}</div>
        ${speed}<div class="rank">${ok?'Nice one 💚':"Next one's yours 💪"}</div></div>`);
    } else {
      show(`<div class="feedback"><div class="big">😴</div><div class="msg">No answer that round</div>
        <div class="rank">Jump in on the next one!</div></div>`);
    }
    // sound once per question reveal
    const sig=p+':'+state.qIndex;
    if(sig!==lastSig){ lastSig=sig; if(q.type!=='open'){ state.you.correct?playGood():playBad(); } }
  } else if(p==='podium'){
    // community vibe — no winners, no losers, just your own run
    const stats = `✓ ${state.you.nCorrect||0} correct` + (state.you.avg!=null?` · ⚡ ${state.you.avg}s avg`:'');
    show(`<div class="feedback"><div class="big">🎉</div>
      <div class="msg">Great game, ${esc(state.you.name)}!</div>
      <div class="gain" style="font-size:22px">${stats}</div>
      <div class="rank">Thanks for playing 💙</div></div>`);
    const sig=p+':done';
    if(sig!==lastSig){ lastSig=sig; playGood(); }
  }
}

/* --- tiny Web Audio (offline) --- */
let actx=null;
function unlockAudio(){ if(!actx){ try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } if(actx&&actx.state==='suspended') actx.resume(); }
function tone(freq,start,dur,type,gain){
  if(!actx) return;
  const o=actx.createOscillator(), g=actx.createGain();
  o.type=type||'triangle'; o.frequency.value=freq;
  o.connect(g); g.connect(actx.destination);
  const t0=actx.currentTime+start;
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(gain||0.2,t0+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.start(t0); o.stop(t0+dur+0.05);
}
function playGood(){ [659.25,880,1174.7].forEach((f,i)=>tone(f,i*0.08,0.4,'triangle',0.2)); }
function playBad(){ tone(311.1,0,0.3,'sawtooth',0.15); tone(207.65,0.12,0.4,'sawtooth',0.14); }

// boot
if(pid){ connect(); } else { joinScreen(); }
</script>
</body>
</html>
